# Nginx主配置文件
# 使用方式：将 conf.d 目录下的配置文件复制到 Nginx 的 conf 目录下

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 引入子配置（相对于 Nginx 安装目录的 conf 目录）
    include conf.d/*.conf;
}